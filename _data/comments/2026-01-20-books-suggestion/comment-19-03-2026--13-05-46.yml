  Well, being an isha website, you can start by reading Sadhguru books. My personal favourite is Karma & Death. Both are very intense reading though. 
  
  If you are traveller kinds & like a bit light reading - Himalayan Lust is a great book. Then there is all time favourite of people - Mystic Musings. 