message: |
  I was thinking, how about we do a community session in the morning. Basically, share a google/zoom meet link, in which everyone joins by 5:30 AM (they join from the phone & keep the phone in a way that they are visible from the camera). One of the person than does guru pooja, followed by om chanting for 20 minutes & then people do their own practices. People are free to leave whenever they like to. This will create the same community kind of atmosphere but remotely. What say ? 